name: React Native / Expo CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build_and_check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./tikol # Since your app code is inside this folder

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./tikol/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Check
        run: npm run typecheck

      - name: ESLint Check
        run: npm run lint

      - name: Run Tests
        run: npm run test
